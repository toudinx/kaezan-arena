<section class="helper-window">
  <header class="helper-window__header">
    <span>Assist Controller</span>
    @if (assistEnabled) {
      <span class="helper-window__auto-chip">AUTO</span>
    }
  </header>

  <label class="helper-window__row">
    <input type="checkbox" [checked]="assistEnabled" (change)="onAssistEnabledChanged($event)" [disabled]="!isRunStarted" />
    <span>Enabled</span>
  </label>

  <div class="helper-window__skills">
    @for (row of manualSkillRows; track trackManualSkillRowByHotkey($index, row)) {
      <article
        class="helper-window__skill-row"
        [class.helper-window__skill-row--ready]="row.isReady"
      >
        <span class="helper-window__hotkey">{{ row.hotkey }}</span>
        <div class="helper-window__skill-content">
          <div class="helper-window__skill-meta">
            <span class="helper-window__skill-name">{{ row.displayName }}</span>
            <span class="helper-window__cooldown-label">{{ row.cooldownRemainingLabel }}</span>
          </div>
          <div
            class="helper-window__cooldown-track"
            role="progressbar"
            [attr.aria-valuemin]="0"
            [attr.aria-valuemax]="100"
            [attr.aria-valuenow]="row.cooldownRemainingPercent"
          >
            <span class="helper-window__cooldown-fill" [style.width.%]="row.cooldownRemainingPercent"></span>
          </div>
        </div>
      </article>
    } @empty {
      <p class="helper-window__empty">No active kit data.</p>
    }
  </div>
</section>

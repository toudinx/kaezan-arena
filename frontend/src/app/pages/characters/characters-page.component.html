<div class="character-management">
  <header class="top-bar">
    <div class="header-title">KAELIS // <strong>{{ activeTabLabel }}</strong></div>
  </header>

  <app-kaelis-roster-strip
    [entries]="rosterEntries"
    [selectedId]="selectedCharacterId() ?? undefined"
    (selectEntry)="selectEntry($event)"
    (previous)="previousEntry()"
    (next)="nextEntry()"
  ></app-kaelis-roster-strip>

  <div class="stage-grid">
    <app-kaelis-side-navigation
      [activeTab]="activeTab()"
      (tabChange)="setActiveTab($event)"
    ></app-kaelis-side-navigation>

    @if (activeTab() === 'bestiary') {
      <div class="bestiary-area">
        <app-bestiary-page
          [embedded]="true"
          [contextCharacterId]="selectedCharacterId()"
        ></app-bestiary-page>
      </div>
    } @else {
      <app-kaelis-center-preview
        [activeTab]="activeTab()"
        [characterImageUrl]="activeCharacterImageUrl"
        [weaponImageUrl]="activeWeaponImageUrl"
        [characterName]="activeCharacterName"
        [sigilSlots]="sigilSlotCards"
        [busySigilSlotIndex]="sigilBusySlotIndex()"
        (slotClick)="openSigilModal($event)"
        (unequipClick)="unequipSigilFromSlot($event)"
      ></app-kaelis-center-preview>

      <app-kaelis-info-panel
        [activeTab]="activeTab()"
        [characterName]="activeCharacterName"
        [characterSubtitle]="activeCharacterSubtitle"
        [masteryLevel]="masteryLevel"
        [masteryXp]="masteryXp"
        [masteryXpRequired]="masteryXpRequired"
        [baseStats]="baseStats"
        [weapon]="weaponInfo"
        [weaponStats]="weaponStats"
        [equippedWeaponName]="equippedWeaponName"
        [fixedKitNames]="activeCharacterFixedKit"
        [isActiveCharacter]="isSelectedCharacterActive"
        [sigilSlots]="sigilSlotCards"
        (changeWeapon)="openWeaponModal()"
        (setActiveCharacter)="setSelectedCharacterAsActive()"
      ></app-kaelis-info-panel>
    }
  </div>

  @if (activeTab() === 'sigils' && sigilActionError()) {
    <div class="sigil-error-banner" role="alert">{{ sigilActionError() }}</div>
  }

  <app-kaelis-selection-modal
    [open]="modalOpen()"
    [mode]="modalMode()"
    [items]="modalItems"
    [selectedId]="modalSelectedId()"
    [slotIndex]="selectedSigilSlotIndex()"
    [sigilContext]="sigilModalContext"
    (closed)="closeModal()"
    (confirmed)="confirmSelection($event)"
  ></app-kaelis-selection-modal>
</div>

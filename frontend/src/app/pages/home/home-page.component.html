<div class="home-shell" data-testid="home-page" [style.background]="currentBackground.shellBackground">
  <app-home-background
    [imageUrl]="currentBackground.imageUrl"
    [gradientOverlay]="currentBackground.overlay"
  ></app-home-background>

  <div class="home-stage">
    <app-home-character-stage
      [imageUrl]="characterImageUrl"
    ></app-home-character-stage>

    <app-home-top-left-hud
      [commanderName]="hudAccountLabel"
      [level]="accountLevel"
      [xpProgress]="xpProgress"
    ></app-home-top-left-hud>

    <app-home-top-right-actions
      [actions]="actionItems"
    ></app-home-top-right-actions>

    <app-home-main-navigation
      [items]="mainNavItems"
    ></app-home-main-navigation>

    <app-home-event-banner
      [label]="contractsBannerLabel"
      title="Daily Contracts"
      [timer]="dailyContractsResetLabel"
      (bannerClick)="openDailyContracts()"
    ></app-home-event-banner>

    <button type="button" class="home-background-toggle" (click)="cycleBackground()">
      Background: {{ currentBackground.label }}
    </button>
  </div>

  <app-daily-contracts-modal
    [isOpen]="dailyContractsOpen"
    [isRefreshing]="dailyContractsRefreshing"
    [loadError]="dailyContractsLoadError"
    [assignedDateLabel]="dailyContractsAssignedDateLabel"
    [resetLabel]="dailyContractsResetLabel"
    [accountXpHint]="accountXpHint"
    [rows]="dailyContractRows"
    (closeRequested)="closeDailyContracts()"
    (refreshRequested)="refreshDailyContracts()"
  ></app-daily-contracts-modal>
</div>

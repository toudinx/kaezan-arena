<div class="arena-elemental">
  <header class="arena-elemental__header">
    <button type="button" class="header-back" (click)="goBack()">
      <svg class="header-back__icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Arena Select
    </button>
    <span class="header-title">
      Arena <span class="header-title__sep">//</span> <strong>Elemental Arenas</strong>
    </span>
  </header>

  <div class="arena-elemental__body">
    <p class="arena-elemental__eyebrow">Select an arena</p>

    <div class="arena-grid">
      @for (arena of arenaCards; track arena.arenaId) {
        <button
          type="button"
          class="arena-card arena-card--{{ arena.elementKey }}"
          (click)="enterArena(arena.arenaId)"
        >
          <div class="arena-card__glow" aria-hidden="true"></div>
          <div class="arena-card__inner">
            <span class="arena-card__element-badge">{{ arena.elementLabel }}</span>
            <p class="arena-card__name">{{ arena.displayName }}</p>
            <p class="arena-card__description">{{ arena.description }}</p>
            <div class="arena-card__drops">
              <span class="arena-card__drop-item">{{ arena.coreDrop }}</span>
              <span class="arena-card__drop-sep">·</span>
              <span class="arena-card__drop-item">{{ arena.dustDrop }}</span>
            </div>
            <span class="arena-card__cta">Enter</span>
          </div>
        </button>
      }
    </div>
  </div>
</div>
